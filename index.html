<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>果冻方块：移动端左右并排版</title>
    <style>
        /* 终极锁屏：防止手机端任何形式的页面滑动和回弹 */
        html, body { 
            background: #e0d7c0; color: #555; font-family: 'Segoe UI', sans-serif; 
            width: 100vw; height: 100vh; margin: 0; padding: 0;
            overflow: hidden; position: fixed; touch-action: none; 
            display: flex; justify-content: center; align-items: center;
        }
        
        #game-wrapper { 
            display: flex; gap: 20px; align-items: flex-start; 
        }

        #game-container { 
            position: relative; width: 240px; height: 400px; 
            border: 8px solid #fff; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); flex-shrink: 0;
        }
        
        canvas { display: block; background: #FAF3E0; border-radius: 4px; }
        
        /* 默认电脑端右侧边栏样式 */
        #side-panel { 
            width: 220px; height: 416px; box-sizing: border-box;
            padding: 20px; background: #fff; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; 
            position: relative;
        }

        .stats-top { margin-bottom: 10px; }
        .stat-item { margin-bottom: 8px; font-size: 14px; }
        .stat-item b { color: #FF9AA2; font-size: 16px; }

        .preview-area { text-align: center; margin: 10px 0; }
        
        .medal-section { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; border-top: 2px solid #f9f9f9; padding-top: 10px; }
        #medal-container { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        #medal-container::-webkit-scrollbar { width: 4px; }
        #medal-container::-webkit-scrollbar-thumb { background: #FFB7B2; border-radius: 10px; }

        .medal-item { margin-bottom: 15px; }
        .medal-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .medal-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: #f0f0f0; border-radius: 50%; transition: 0.3s; }
        .medal-name { font-weight: bold; font-size: 12px; }
        .progress-bg { height: 5px; background: #eee; border-radius: 3px; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #FFB7B2, #FF9AA2); transition: width 0.6s; }

        #tooltip { position: absolute; display: none; background: rgba(0,0,0,0.8); color: white; padding: 8px; border-radius: 6px; font-size: 11px; z-index: 100; pointer-events: none; width: 130px; }
        #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: #fff; padding: 12px 25px; border-radius: 50px; border-left: 8px solid #FFB7B2; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; z-index: 200; font-weight: bold; }
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.3); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); flex-direction: column; justify-content: center; align-items: center; z-index: 10; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background: #FFB7B2; color: #fff; border: none; border-radius: 20px; font-weight: bold; }

        /* =========================================
           移动端专属：极窄并排响应式排版
           ========================================= */
        @media (max-width: 600px) {
            body { 
                align-items: flex-start; 
                padding-top: 5vh; /* 距离顶部留出一点呼吸空间 */
            }
            #game-wrapper { 
                flex-direction: row; /* 强制保持左右并排 */
                gap: 10px; 
                /* 核心黑科技：以 380px 为基准，根据屏幕宽度动态等比缩放整体布局 */
                transform: scale(calc(100vw / 380)); 
                transform-origin: top center;
            }
            #game-container { 
                border-width: 6px; /* 边框稍微变细一点节省空间 */
            }
            
            /* 1. 极限压缩右侧面板宽度 */
            #side-panel { 
                width: 110px;  /* 从 220px 砍半 */
                height: 412px; /* 保持与左侧游戏区完全等高 */
                padding: 10px; 
            }
            
            /* 2. 缩小文字和预览方块 */
            .stats-top { margin-bottom: 5px; }
            .stat-item { font-size: 11px; margin-bottom: 4px; }
            .stat-item b { font-size: 13px; }
            
            .preview-area { margin: 5px 0; }
            .preview-area p { font-size: 10px; margin-bottom: 2px; }
            #next-piece { width: 60px !important; height: 60px !important; } /* 缩小预览区 */
            
            /* 3. 勋章墙布局从“左右”改为“上下”堆叠 */
            .medal-section { padding-top: 5px; }
            .medal-section p { font-size: 11px !important; margin-bottom: 5px !important; }
            .medal-item { margin-bottom: 10px; }
            .medal-header { 
                flex-direction: column; /* 图标在上，文字在下 */
                align-items: center; 
                gap: 2px; 
            }
            .medal-icon { width: 26px; height: 26px; font-size: 14px; }
            .medal-name { font-size: 10px; text-align: center; }
            .progress-bg { height: 4px; }
        }
    </style>
</head>
<body>

    <div id="toast">🏆 <span id="toast-name"></span></div>
    <div id="tooltip"></div>

    <div id="game-wrapper">
        <div id="game-container">
            <canvas id="tetris" width="240" height="400"></canvas>
            <div id="pause-modal" class="modal"><h2 style="font-size:24px;">暂停</h2><p style="font-size:12px;">点击继续</p></div>
            <div id="game-over-modal" class="modal">
                <h2 style="font-size:24px;">结束</h2>
                <p style="font-size:12px;">得分: <b id="final-score">0</b></p>
                <button onclick="restartGame()">再来</button>
            </div>
        </div>

        <div id="side-panel">
            <div class="stats-top">
                <div class="stat-item">得分: <b id="score">0</b></div>
                <div class="stat-item">时间: <b id="time">0</b>s</div>
            </div>
            
            <div class="preview-area">
                <p style="color: #888;">下一个</p>
                <canvas id="next-piece" width="80" height="80" style="border: 1px solid #eee; border-radius: 5px; margin: 0 auto; display: block;"></canvas>
            </div>

            <div class="medal-section">
                <p style="color: #888; text-align: center;">勋章墙</p>
                <div id="medal-container">
                    </div>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
