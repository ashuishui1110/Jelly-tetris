<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>果冻方块：触控大师版</title>
    <style>
        body { 
            background: #e0d7c0; color: #555; font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow-x: hidden; 
        }
        
        /* 响应式容器：手机上变为纵向排列 */
        #game-wrapper { 
            display: flex; gap: 20px; align-items: flex-start; 
            padding: 20px; box-sizing: border-box;
        }

        #game-container { 
            position: relative; width: 240px; height: 400px; 
            border: 8px solid #fff; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); flex-shrink: 0;
        }

        /* 关键：禁用 Canvas 默认手势，确保滑动顺滑 */
        canvas { 
            display: block; background: #FAF3E0; border-radius: 4px; 
            touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        
        #side-panel { 
            width: 220px; height: 416px; box-sizing: border-box;
            padding: 20px; background: #fff; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; 
        }

        /* 勋章墙内部滚动 */
        .medal-section { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; border-top: 2px solid #f9f9f9; padding-top: 10px; }
        #medal-container { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        #medal-container::-webkit-scrollbar { width: 4px; }
        #medal-container::-webkit-scrollbar-thumb { background: #FFB7B2; border-radius: 10px; }

        .stat-item { margin-bottom: 8px; font-size: 14px; }
        .stat-item b { color: #FF9AA2; font-size: 16px; }
        .medal-item { margin-bottom: 15px; }
        .medal-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .medal-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: #f0f0f0; border-radius: 50%; transition: 0.3s; }
        .medal-name { font-weight: bold; font-size: 12px; }
        .progress-bg { height: 5px; background: #eee; border-radius: 3px; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #FFB7B2, #FF9AA2); transition: width 0.6s; }

        /* 弹窗与提示 */
        #tooltip { position: absolute; display: none; background: rgba(0,0,0,0.8); color: white; padding: 8px; border-radius: 6px; font-size: 11px; z-index: 100; pointer-events: none; width: 130px; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #fff; padding: 12px 25px; border-radius: 50px; border-left: 8px solid #FFB7B2; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; z-index: 200; font-weight: bold; }
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.3); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        button { padding: 10px 20px; cursor: pointer; background: #FFB7B2; color: #fff; border: none; border-radius: 20px; font-weight: bold; }

        /* 移动端适配：屏幕小于 600px 时纵向排列 */
        @media (max-width: 600px) {
            #game-wrapper { flex-direction: column; align-items: center; padding: 10px; }
            #side-panel { width: 240px; height: 300px; }
            #game-container { transform: scale(1.1); margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div id="toast">🏅 解锁成就：<span id="toast-name"></span></div>
    <div id="tooltip"></div>

    <div id="game-wrapper">
        <div id="game-container">
            <canvas id="tetris" width="240" height="400"></canvas>
            <div id="pause-modal" class="modal"><h2>暂停中</h2><p>点击屏幕继续</p></div>
            <div id="game-over-modal" class="modal">
                <h2>GAME OVER</h2>
                <p>最终得分: <b id="final-score">0</b></p>
                <button onclick="restartGame()">再来一局</button>
            </div>
        </div>

        <div id="side-panel">
            <div class="stat-top">
                <div class="stat-item">得分: <b id="score">0</b></div>
                <div class="stat-item">时间: <b id="time">0</b>s</div>
            </div>
            <div class="preview-area" style="text-align:center; margin: 10px 0;">
                <canvas id="next-piece" width="80" height="80"></canvas>
            </div>
            <div class="medal-section">
                <p style="font-size: 13px; font-weight: bold; margin: 0 0 10px 0;">勋章墙</p>
                <div id="medal-container"></div>
            </div>
            <p style="font-size: 10px; color: #bbb; text-align: center; margin-top: 10px;">滑动控制位移，点击旋转</p>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
